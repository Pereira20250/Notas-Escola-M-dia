<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notas Escola - Calculadora de Média Ponderada</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="shortcut icon" href="Logo.ico" type="image/x-icon">
</head>
<body>
  <h1>Notas Escola</h1>
  <p>Este sistema usa fórmula ponderada: (B + C*2 + D + E*2) / 6 para cada matéria.</p>

  <table id="notasTable">
    <thead>
      <tr>
        <th>Matéria</th>
        <th>B</th>
        <th>C (peso 2)</th>
        <th>D</th>
        <th>E (peso 2)</th>
        <th>Média</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <button onclick="calcularTodas()">Calcular Médias</button>

  <script>
    const materias = [
      'MATEMÁTICA', 'PORTUGUÊS', 'HISTÓRIA', 'GEOGRAFIA', 'SOCIOLOGIA',
      'INGLÊS', 'FÍSICA', 'BIOLOGIA', 'QUÍMICA', 'EDUCAÇÃO FÍSICA', 'INICIAÇÃO CIENTÍFICA'
    ];

    const tbody = document.querySelector('#notasTable tbody');

    materias.forEach((materia, idx) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${materia}</td>
        <td><input type="number" min="0" max="10" step="0.1" id="B${idx}" value="0"></td>
        <td><input type="number" min="0" max="10" step="0.1" id="C${idx}" value="0"></td>
        <td><input type="number" min="0" max="10" step="0.1" id="D${idx}" value="0"></td>
        <td><input type="number" min="0" max="10" step="0.1" id="E${idx}" value="0"></td>
        <td id="M${idx}">0.00</td>
      `;
      tbody.appendChild(tr);
    });

    function calcMedia(b, c, d, e) {
      const media = (Number(b) + Number(c) * 2 + Number(d) + Number(e) * 2) / 6;
      return Number.isFinite(media) ? media : 0;
    }

    function calcularTodas() {
      materias.forEach((_, idx) => {
        const b = parseFloat(document.querySelector(`#B${idx}`).value) || 0;
        const c = parseFloat(document.querySelector(`#C${idx}`).value) || 0;
        const d = parseFloat(document.querySelector(`#D${idx}`).value) || 0;
        const e = parseFloat(document.querySelector(`#E${idx}`).value) || 0;

        const media = calcMedia(b, c, d, e);
        const tdMedia = document.querySelector(`#M${idx}`);
        tdMedia.textContent = media.toFixed(2);

        const tr = tdMedia.parentElement;
        if (media >= 6) {
          tr.classList.add('aprovado');
          tr.classList.remove('reprovado');
        } else {
          tr.classList.add('reprovado');
          tr.classList.remove('aprovado');
        }
      });
    }

    function atualizarFundo() {
      const cor = document.getElementById('bgColor').value;
      const imagem = document.getElementById('bgImage').value.trim();

      document.body.style.backgroundColor = cor;
      if (imagem) {
        document.body.style.backgroundImage = `url('${imagem}')`;
        document.body.style.backgroundSize = 'cover';
        document.body.style.backgroundPosition = 'center';
      } else {
        document.body.style.backgroundImage = 'none';
      }
    }

    function limparFundo() {
      document.getElementById('bgColor').value = '#f4f7fb';
      document.getElementById('bgImage').value = '';
      document.body.style.backgroundImage = 'none';
      document.body.style.backgroundColor = '#f4f7fb';
    }

    calcularTodas();
  </script>
</body>
</html>
